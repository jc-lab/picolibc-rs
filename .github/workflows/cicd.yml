name: CI

on:
  push: {}
  pull_request:

jobs:
  build_test:
    name: Build Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-uefi
          - aarch64-unknown-uefi
          - x86_64-unknown-none
          - aarch64-unknown-none
    steps:
      - uses: actions/checkout@v6
        with:
          # picolibc itself is vendored as a submodule; it must be present to
          # compile the C sources and generate bindings.
          submodules: recursive

      - name: Install clang / libclang
        # clang compiles the picolibc C sources (and cross-targets UEFI/none),
        # libclang is needed by bindgen, llvm provides llvm-ar for archiving.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev llvm

      - name: Set up Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (all features)
        run: cargo clippy --all-features --target ${{ matrix.target }} -- -D warnings

      - name: Build (all features)
        run: cargo build --all-features --target ${{ matrix.target }}

      - name: Build (no default features)
        run: cargo build --no-default-features --target ${{ matrix.target }}


  # ── Publish to crates.io on version tag ────────────────────────────────────
  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write # Required for OIDC token exchange
    needs:
      - build_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # cargo publish builds & packages the crate, which needs the vendored
          # picolibc submodule present.
          submodules: recursive

      - name: Install clang / libclang
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev llvm

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="picolibc") | .version')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Version mismatch: tag=${TAG_VERSION}, Cargo.toml=${CARGO_VERSION}"
            exit 1
          fi
          echo "Version verified: ${CARGO_VERSION}"

      - id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish picolibc
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p picolibc
